name: Deploy Docs to GitHub Pages

# Publishes the Material for MkDocs site via the official GitHub Pages
# Actions pipeline (upload-pages-artifact + deploy-pages) — NOT the legacy
# gh-pages branch and NOT `mkdocs gh-deploy`. Pages source must be set to
# "GitHub Actions" in the repository settings.
on:
  push:
    branches: [main]
    # Only rebuild when something that affects the site changes.
    paths:
      - "docs/**"
      - "src/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Least-privilege token plus the two grants the Pages deploy flow needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Serialize Pages deployments; never cancel a publish already in flight.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: docs/requirements-docs.txt

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install documentation dependencies
        # torch/transformers are NOT needed: the API reference is generated by
        # griffe via static analysis of ../src (see docs/requirements-docs.txt).
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements-docs.txt

      - name: Build site with MkDocs
        # --strict is intentional: the site builds with zero warnings under
        # --strict (verified locally), so broken internal links or missing nav
        # pages will fail the deploy loudly instead of shipping silently. If a
        # future content change legitimately needs to ship with warnings, drop
        # --strict here. site_dir in docs/mkdocs.yml resolves to docs/_site.
        run: mkdocs build --strict -f docs/mkdocs.yml

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
