name: Tests & Lint

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# One in-flight run per ref; a newer push cancels the older run.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & format (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      # Ruff is the single source of truth for BOTH linting and formatting; its
      # configuration lives in pyproject.toml under [tool.ruff]. This replaces
      # the old black + flake8 + isort trio, which enforced a different line
      # length (88) than the project config (100) and fought each other —
      # producing hundreds of spurious errors. The version is pinned so the
      # formatter's output is reproducible (a newer ruff can reformat code).
      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.15.20
      - name: Lint (ruff check)
        run: ruff check --output-format=github src/ tests/
      - name: Format check (ruff format)
        run: ruff format --check src/ tests/

  test:
    name: Tests (Python ${{ matrix.python-version }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run test suite
        run: pytest tests/ -v
